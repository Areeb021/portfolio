<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <!-- Responsive Navbar -->
    <nav class="navbar">
        <div class="container">
            <div class="logo">
                <a href="index.html">Areeb Bhatti</a>
            </div>
            <button class="menu-toggle" aria-label="Toggle menu">
                <i class="fa-solid fa-bars"></i>
            </button>
            <ul class="menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Me</a></li>
                <li><a href="contact.html" >Contact</a></li>
            </ul>
        </div>
    </nav>

    <!-- Header -->
    <header>
        <h1 class="unique">Contact Me</h1>
    </header>

    <!-- Contact Section -->
    <section class="contact-section">
        <p class="abt">I'd love to hear from you! Feel free to reach out using the form below or connect with me on social media.</p>
        <form action="#" method="POST" class="contact-form">
            <div class="form-group">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" placeholder="Your Name" required>
            </div>
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" placeholder="Your Email" required>
            </div>
            <div class="form-group">
                <label for="message">Message:</label>
                <textarea id="message" name="message" placeholder="Your Message" rows="5" required></textarea>
            </div>
            <button type="submit">Send Message</button>
        </form>
    </section>

    <!-- Footer -->
    <footer>
        <div class="footer">
            <div class="social-links">
                <a href="#" class="fa-brands fa-instagram"></a>
                <a href="#" class="fa-brands fa-twitter"></a>
                <a href="#" class="fa-brands fa-github"></a>
            </div>
            <div class="footer-info">
                <p class="frc">&copy; 2025 All rights reserved to Areeb Bhatti<br>Designed by Areeb Bhatti</p>
            </div>
        </div>
    </footer>

    <script>
        // Navbar toggle functionality
        const toggleButton = document.querySelector('.menu-toggle');
        const menu = document.querySelector('.menu');

        toggleButton.addEventListener('click', () => {
            menu.classList.toggle('show');
        });
    </script>
</body>
</html>
